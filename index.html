<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Consciousness Dashboard v6.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* App Shell */
        .app { display: flex; min-height: 100vh; background: var(--bg-0); }
        
        /* Sidebar */
        .sidebar { 
            width: 280px; 
            background: var(--bg-1); 
            border-right: 1px solid oklch(100% 0 0 / 0.05);
            display: flex; 
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .logo { 
            padding: var(--space-6); 
            font-size: var(--text-xl);
            font-weight: 700; 
            color: var(--amber-500);
            border-bottom: 1px solid oklch(100% 0 0 / 0.05);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .logo-pulse {
            width: 12px;
            height: 12px;
            background: var(--amber-500);
            border-radius: 50%;
            box-shadow: 0 0 16px var(--amber-500);
            animation: pulse 2s ease-in-out infinite;
        }
        .nav { padding: var(--space-4); }
        .nav-item { 
            padding: var(--space-4) var(--space-5); 
            cursor: pointer; 
            color: var(--text-secondary); 
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            transition: all var(--duration-fast) var(--ease-out-quart);
            border: 1px solid transparent;
            font-size: var(--text-sm);
        }
        .nav-item:hover { 
            color: var(--text-primary); 
            background: oklch(100% 0 0 / 0.03);
        }
        .nav-item.active { 
            color: var(--amber-400);
            background: oklch(68% 0.18 75 / 0.08);
            border-color: oklch(68% 0.18 75 / 0.2);
        }
        .nav-badge {
            margin-left: auto;
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            background: oklch(60% 0.18 25 / 0.2);
            color: var(--danger);
            border-radius: var(--radius-full);
            font-weight: 600;
        }
        
        /* Main Content */
        .main { 
            flex: 1; 
            margin-left: 280px;
            padding: var(--space-6);
            min-height: 100vh;
        }
        
        /* Tab System */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn var(--duration-slow) var(--ease-out-expo); }
        
        /* Intervention Banner */
        .intervention-banner {
            background: oklch(60% 0.18 25 / 0.1);
            border: 1px solid oklch(60% 0.18 25 / 0.3);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: flex-start;
            gap: var(--space-4);
        }
        .intervention-banner.amber {
            background: oklch(68% 0.18 75 / 0.1);
            border-color: oklch(68% 0.18 75 / 0.3);
        }
        .intervention-icon {
            width: 40px;
            height: 40px;
            background: oklch(60% 0.18 25 / 0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xl);
            flex-shrink: 0;
        }
        .intervention-banner.amber .intervention-icon {
            background: oklch(68% 0.18 75 / 0.2);
        }
        .intervention-content { flex: 1; }
        .intervention-title {
            font-weight: 600;
            margin-bottom: var(--space-2);
            color: var(--danger);
        }
        .intervention-banner.amber .intervention-title {
            color: var(--amber-400);
        }
        .intervention-action {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        
        /* State Hero */
        .state-hero {
            background: linear-gradient(135deg, oklch(68% 0.18 75 / 0.08) 0%, var(--bg-2) 50%);
            border: 1px solid oklch(68% 0.18 75 / 0.15);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            margin-bottom: var(--space-6);
            position: relative;
            overflow: hidden;
        }
        .state-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--amber-500), transparent);
        }
        .state-headline {
            font-size: var(--text-2xl);
            font-weight: 600;
            margin-bottom: var(--space-4);
        }
        .state-meta {
            font-size: var(--text-lg);
            color: var(--text-secondary);
        }
        
        /* Vitals Grid */
        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }
        .vital-card {
            background: var(--bg-2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            border: 1px solid oklch(100% 0 0 / 0.05);
        }
        .vital-label {
            font-size: var(--text-xs);
            text-transform: uppercase;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            margin-bottom: var(--space-2);
        }
        .vital-value {
            font-family: var(--font-mono);
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--text-primary);
        }
        .vital-unit {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-left: var(--space-2);
        }
        .vital-trend {
            font-size: var(--text-sm);
            margin-top: var(--space-2);
        }
        .vital-trend.up { color: var(--success); }
        .vital-trend.down { color: var(--danger); }
        .vital-trend.flat { color: var(--text-tertiary); }
        
        /* Thought Stream */
        .thought-stream {
            background: var(--bg-2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            border: 1px solid oklch(100% 0 0 / 0.05);
        }
        .thought-header {
            font-size: var(--text-sm);
            text-transform: uppercase;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            margin-bottom: var(--space-4);
        }
        .thought-item {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
            font-size: var(--text-sm);
        }
        .thought-label {
            color: var(--text-tertiary);
            width: 120px;
            flex-shrink: 0;
        }
        .thought-value {
            color: var(--text-primary);
        }
        
        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-5);
        }
        .card-full { grid-column: 1 / -1; }
        
        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-5);
        }
        .section-title {
            font-size: var(--text-lg);
            font-weight: 600;
        }
        
        /* Skill Network */
        .skill-node {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
        }
        .skill-name { flex: 1; font-weight: 500; }
        .skill-usage {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        .skill-status {
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-full);
            text-transform: uppercase;
        }
        .skill-status.active {
            background: oklch(65% 0.15 145 / 0.15);
            color: var(--success);
        }
        .skill-status.underused {
            background: oklch(68% 0.18 75 / 0.15);
            color: var(--amber-400);
        }
        .skill-status.neglected {
            background: oklch(100% 0 0 / 0.1);
            color: var(--text-tertiary);
        }
        
        /* Model Routing */
        .routing-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
            font-size: var(--text-sm);
        }
        .routing-task { flex: 1; }
        .routing-model {
            font-family: var(--font-mono);
            color: var(--amber-400);
        }
        .routing-cost {
            color: var(--text-secondary);
        }
        .routing-outcome {
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            text-transform: uppercase;
        }
        .routing-outcome.excellent {
            background: oklch(65% 0.15 145 / 0.15);
            color: var(--success);
        }
        .routing-outcome.good {
            background: oklch(68% 0.18 75 / 0.15);
            color: var(--amber-400);
        }
        
        /* Blocker Card */
        .blocker-card {
            background: oklch(60% 0.18 25 / 0.08);
            border: 1px solid oklch(60% 0.18 25 / 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            margin-bottom: var(--space-4);
        }
        .blocker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-3);
        }
        .blocker-title {
            color: var(--danger);
            font-weight: 600;
        }
        .blocker-owner {
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            background: oklch(100% 0 0 / 0.1);
            border-radius: var(--radius-full);
        }
        .blocker-desc {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            margin-bottom: var(--space-3);
        }
        
        /* Milestone */
        .milestone-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin-bottom: var(--space-4);
        }
        .milestone-name { flex: 1; font-weight: 500; }
        .milestone-track {
            width: 200px;
            height: 8px;
            background: var(--bg-1);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .milestone-fill {
            height: 100%;
            background: var(--amber-500);
            border-radius: var(--radius-full);
            transition: width var(--duration-slow) var(--ease-out-expo);
        }
        .milestone-percent {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            width: 50px;
            text-align: right;
        }
        
        /* File Status */
        .file-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
        }
        .file-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .file-status-dot.active { background: var(--success); }
        .file-status-dot.stale { background: var(--amber-400); }
        .file-name { flex: 1; font-weight: 500; }
        .file-health {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .vitals-grid { grid-template-columns: repeat(2, 1fr); }
            .cards-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; }
            .vitals-grid { grid-template-columns: 1fr; }
        }
        
        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-pulse"></div>
                Claw
            </div>
            <nav class="nav">
                <div class="nav-item active" data-tab="now" onclick="switchTab('now')">
                    <span>◈</span> NOW
                </div>
                <div class="nav-item" data-tab="mind" onclick="switchTab('mind')">
                    <span>◈</span> MIND
                </div>
                <div class="nav-item" data-tab="memory" onclick="switchTab('memory')">
                    <span>◈</span> MEMORY
                </div>
                <div class="nav-item" data-tab="training" onclick="switchTab('training')">
                    <span>◈</span> TRAINING
                    <span class="nav-badge">2</span>
                </div>
                <div class="nav-item" data-tab="trading" onclick="switchTab('trading')">
                    <span>◈</span> TRADING
                </div>
                <div class="nav-item" data-tab="system" onclick="switchTab('system')">
                    <span>◈</span> SYSTEM
                </div>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main" id="mainContent">
            <!-- Content injected by JavaScript -->
        </main>
    </div>
    
    <script src="cognition-intelligence.js"></script>
    <script src="data-bridge.js"></script>
    <script>
        let cognitionData = null;
        let currentTab = 'now';
        
        async function init() {
            try {
                // Use DataBridge for dynamic data
                cognitionData = await DataBridge.compileDashboardData();
                console.log('Dashboard data loaded:', cognitionData);
                renderTab(currentTab);
            } catch (e) {
                console.error('Failed to load dashboard data:', e);
                document.getElementById('mainContent').innerHTML = `
                    <div style="padding: var(--space-8); text-align: center; color: var(--danger);">
                        <div style="font-size: var(--text-2xl); margin-bottom: var(--space-4);">⚠ Dashboard Error</div>
                        <div style="color: var(--text-secondary);">Failed to load data: ${e.message}</div>
                        <div style="margin-top: var(--space-4); font-size: var(--text-sm); color: var(--text-tertiary);">Check browser console for details</div>
                    </div>
                `;
            }
            
            // Refresh data every 30 seconds
            setInterval(async () => {
                try {
                    cognitionData = await DataBridge.compileDashboardData();
                    if (currentTab === 'now') {
                        renderTab('now'); // Auto-refresh NOW tab
                    }
                } catch (e) {
                    console.error('Refresh failed:', e);
                }
            }, 30000);
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            renderTab(tab);
        }
        
        function renderTab(tab) {
            const container = document.getElementById('mainContent');
            
            switch(tab) {
                case 'now':
                    container.innerHTML = renderNowTab();
                    break;
                case 'mind':
                    container.innerHTML = renderMindTab();
                    break;
                case 'memory':
                    container.innerHTML = renderMemoryTab();
                    break;
                case 'training':
                    container.innerHTML = renderTrainingTab();
                    break;
                case 'trading':
                    container.innerHTML = renderTradingTab();
                    break;
                case 'system':
                    container.innerHTML = renderSystemTab();
                    break;
            }
        }
        
        function renderNowTab() {
            const now = cognitionData.now;
            const training = cognitionData.training;
            const memory = cognitionData.memory || {};
            const system = cognitionData.system;
            
            return `
                <!-- Chunk 1: Six-Card Summary Grid -->
                <div class="state-hero">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div class="state-headline">CLAW NOW</div>
                            <div class="state-meta">What matters right now</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: var(--space-2);">
                            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite;"></span>
                            <span style="font-size: var(--text-sm); color: var(--success);">Live</span>
                        </div>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); margin-bottom: var(--space-5);">
                    <!-- 🧠 MIND Card -->
                    <div style="background: var(--bg-1); border-radius: var(--radius-lg); padding: var(--space-5); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid rgba(255,255,255,0.05);" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.3)'" onmouseout="this.style.transform=''; this.style.boxShadow=''" onclick="switchTab('mind')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                            <span style="font-size: var(--text-2xl);">🧠</span>
                            <span style="font-size: var(--text-xs); padding: var(--space-1) var(--space-2); background: rgba(74,222,128,0.2); color: var(--success); border-radius: var(--radius-full);">Good</span>
                        </div>
                        <div style="font-weight: 600; font-size: var(--text-lg); margin-bottom: var(--space-2);">MIND</div>
                        <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-3);">${mind.skill_network?.nodes?.length || 22} skills • ${mind.decisions?.autonomous?.count || 0} autonomous decisions</div>
                        <div style="font-size: var(--text-xs); color: var(--text-tertiary);">View MIND →</div>
                    </div>
                    
                    <!-- 📊 SYSTEM Card -->
                    <div style="background: var(--bg-1); border-radius: var(--radius-lg); padding: var(--space-5); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid rgba(255,255,255,0.05);" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.3)'" onmouseout="this.style.transform=''; this.style.boxShadow=''" onclick="switchTab('system')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                            <span style="font-size: var(--text-2xl);">📊</span>
                            <span style="font-size: var(--text-xs); padding: var(--space-1) var(--space-2); background: ${system.gateway?.filter(s => s.status === 'degraded').length > 0 ? 'rgba(224,145,42,0.2)' : 'rgba(74,222,128,0.2)'}; color: ${system.gateway?.filter(s => s.status === 'degraded').length > 0 ? 'var(--amber-400)' : 'var(--success)'}; border-radius: var(--radius-full);">${system.gateway?.filter(s => s.status === 'degraded').length > 0 ? system.gateway.filter(s => s.status === 'degraded').length + ' Issue' : 'All Good'}</span>
                        </div>
                        <div style="font-weight: 600; font-size: var(--text-lg); margin-bottom: var(--space-2);">SYSTEM</div>
                        <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-3);">${system.gateway?.filter(s => s.status === 'online').length || 0}/${system.gateway?.length || 4} services online</div>
                        <div style="font-size: var(--text-xs); color: var(--text-tertiary);">View SYSTEM →</div>
                    </div>
                    
                    <!-- 💰 TRADING Card -->
                    <div style="background: var(--bg-1); border-radius: var(--radius-lg); padding: var(--space-5); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid rgba(255,255,255,0.05);" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.3)'" onmouseout="this.style.transform=''; this.style.boxShadow=''" onclick="switchTab('trading')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                            <span style="font-size: var(--text-2xl);">💰</span>
                            <span style="font-size: var(--text-xs); padding: var(--space-1) var(--space-2); background: rgba(100,100,100,0.2); color: var(--text-tertiary); border-radius: var(--radius-full);">Basic</span>
                        </div>
                        <div style="font-weight: 600; font-size: var(--text-lg); margin-bottom: var(--space-2);">TRADING</div>
                        <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-3);">${system.trading?.total_predictions || 0} predictions • ${system.trading?.edge_discovery_rate || 0} edges found</div>
                        <div style="font-size: var(--text-xs); color: var(--text-tertiary);">View TRADING →</div>
                    </div>
                    
                    <!-- 🎯 TRAINING Card -->
                    <div style="background: var(--bg-1); border-radius: var(--radius-lg); padding: var(--space-5); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid rgba(255,255,255,0.05);" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.3)'" onmouseout="this.style.transform=''; this.style.boxShadow=''" onclick="switchTab('training')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                            <span style="font-size: var(--text-2xl);">🎯</span>
                            <span style="font-size: var(--text-xs); padding: var(--space-1) var(--space-2); background: rgba(74,222,128,0.2); color: var(--success); border-radius: var(--radius-full);">On Track</span>
                        </div>
                        <div style="font-weight: 600; font-size: var(--text-lg); margin-bottom: var(--space-2);">TRAINING</div>
                        <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-3);">Week ${training.week}/16 • 65% to auto</div>
                        <div style="font-size: var(--text-xs); color: var(--text-tertiary);">View TRAINING →</div>
                    </div>
                    
                    <!-- 📝 MEMORY Card -->
                    <div style="background: var(--bg-1); border-radius: var(--radius-lg); padding: var(--space-5); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid rgba(255,255,255,0.05);" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.3)'" onmouseout="this.style.transform=''; this.style.boxShadow=''" onclick="switchTab('memory')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                            <span style="font-size: var(--text-2xl);">📝</span>

        // Skill Network Visualization
        function renderSkillNetwork(nodes) {
            const container = document.getElementById('skillNetworkViz');
            if (!container) return;
            
            const width = container.clientWidth;
            const height = 400;
            const centerX = width / 2;
            const centerY = height / 2;
            
            // Calculate node positions (simple radial layout)
            const nodePositions = {};
            const radius = 120;
            const angleStep = (2 * Math.PI) / nodes.length;
            
            nodes.forEach((node, i) => {
                const angle = i * angleStep - Math.PI / 2;
                nodePositions[node.id] = {
                    x: centerX + radius * Math.cos(angle),
                    y: centerY + radius * Math.sin(angle),
                    r: 20 + node.usage * 2 // Size based on usage
                };
            });
            
            // Generate SVG
            let svg = `<svg width="${width}" height="${height}" style="cursor: pointer;">`;
            
            // Draw synergy connections
            nodes.forEach(node => {
                node.synergy.forEach(synergyId => {
                    if (nodePositions[synergyId]) {
                        const start = nodePositions[node.id];
                        const end = nodePositions[synergyId];
                        svg += `<line x1="${start.x}" y1="${start.y}" x2="${end.x}" y2="${end.y}" stroke="rgba(224,145,42,0.3)" stroke-width="2" />`;
                    }
                });
            });
            
            // Draw nodes
            nodes.forEach(node => {
                const pos = nodePositions[node.id];
                const color = node.status === 'active' ? 'var(--success)' : 
                             node.status === 'underused' ? 'var(--amber-400)' : 'var(--text-tertiary)';
                
                svg += `
                    <g class="skill-node" onclick="showSkillDetail('${node.id}')" style="cursor: pointer;">
                        <circle cx="${pos.x}" cy="${pos.y}" r="${pos.r}" fill="${color}" opacity="0.8" stroke="var(--bg-0)" stroke-width="2"/>
                        <text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="middle" fill="var(--bg-0)" font-size="12" font-weight="600">${node.usage}</text>
                        <text x="${pos.x}" y="${pos.y + pos.r + 15}" text-anchor="middle" fill="var(--text-primary)" font-size="11">${node.id}</text>
                    </g>
                `;
            });
            
            svg += '</svg>';
            container.innerHTML = svg;
            
            // Store node data for detail view
            window.skillNetworkData = {};
            nodes.forEach(node => {
                window.skillNetworkData[node.id] = node;
            });
        }
