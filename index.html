<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Consciousness Dashboard v6.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* App Shell */
        .app { display: flex; min-height: 100vh; background: var(--bg-0); }
        
        /* Sidebar */
        .sidebar { 
            width: 280px; 
            background: var(--bg-1); 
            border-right: 1px solid oklch(100% 0 0 / 0.05);
            display: flex; 
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .logo { 
            padding: var(--space-6); 
            font-size: var(--text-xl);
            font-weight: 700; 
            color: var(--amber-500);
            border-bottom: 1px solid oklch(100% 0 0 / 0.05);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .logo-pulse {
            width: 12px;
            height: 12px;
            background: var(--amber-500);
            border-radius: 50%;
            box-shadow: 0 0 16px var(--amber-500);
            animation: pulse 2s ease-in-out infinite;
        }
        .nav { padding: var(--space-4); }
        .nav-item { 
            padding: var(--space-4) var(--space-5); 
            cursor: pointer; 
            color: var(--text-secondary); 
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            transition: all var(--duration-fast) var(--ease-out-quart);
            border: 1px solid transparent;
            font-size: var(--text-sm);
        }
        .nav-item:hover { 
            color: var(--text-primary); 
            background: oklch(100% 0 0 / 0.03);
        }
        .nav-item.active { 
            color: var(--amber-400);
            background: oklch(68% 0.18 75 / 0.08);
            border-color: oklch(68% 0.18 75 / 0.2);
        }
        .nav-badge {
            margin-left: auto;
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            background: oklch(60% 0.18 25 / 0.2);
            color: var(--danger);
            border-radius: var(--radius-full);
            font-weight: 600;
        }
        
        /* Main Content */
        .main { 
            flex: 1; 
            margin-left: 280px;
            padding: var(--space-6);
            min-height: 100vh;
        }
        
        /* Tab System */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn var(--duration-slow) var(--ease-out-expo); }
        
        /* Intervention Banner */
        .intervention-banner {
            background: oklch(60% 0.18 25 / 0.1);
            border: 1px solid oklch(60% 0.18 25 / 0.3);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: flex-start;
            gap: var(--space-4);
        }
        .intervention-banner.amber {
            background: oklch(68% 0.18 75 / 0.1);
            border-color: oklch(68% 0.18 75 / 0.3);
        }
        .intervention-icon {
            width: 40px;
            height: 40px;
            background: oklch(60% 0.18 25 / 0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xl);
            flex-shrink: 0;
        }
        .intervention-banner.amber .intervention-icon {
            background: oklch(68% 0.18 75 / 0.2);
        }
        .intervention-content { flex: 1; }
        .intervention-title {
            font-weight: 600;
            margin-bottom: var(--space-2);
            color: var(--danger);
        }
        .intervention-banner.amber .intervention-title {
            color: var(--amber-400);
        }
        .intervention-action {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        
        /* State Hero */
        .state-hero {
            background: linear-gradient(135deg, oklch(68% 0.18 75 / 0.08) 0%, var(--bg-2) 50%);
            border: 1px solid oklch(68% 0.18 75 / 0.15);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            margin-bottom: var(--space-6);
            position: relative;
            overflow: hidden;
        }
        .state-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--amber-500), transparent);
        }
        .state-headline {
            font-size: var(--text-2xl);
            font-weight: 600;
            margin-bottom: var(--space-4);
        }
        .state-meta {
            font-size: var(--text-lg);
            color: var(--text-secondary);
        }
        
        /* Vitals Grid */
        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }
        .vital-card {
            background: var(--bg-2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            border: 1px solid oklch(100% 0 0 / 0.05);
        }
        .vital-label {
            font-size: var(--text-xs);
            text-transform: uppercase;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            margin-bottom: var(--space-2);
        }
        .vital-value {
            font-family: var(--font-mono);
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--text-primary);
        }
        .vital-unit {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-left: var(--space-2);
        }
        .vital-trend {
            font-size: var(--text-sm);
            margin-top: var(--space-2);
        }
        .vital-trend.up { color: var(--success); }
        .vital-trend.down { color: var(--danger); }
        .vital-trend.flat { color: var(--text-tertiary); }
        
        /* Thought Stream */
        .thought-stream {
            background: var(--bg-2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            border: 1px solid oklch(100% 0 0 / 0.05);
        }
        .thought-header {
            font-size: var(--text-sm);
            text-transform: uppercase;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            margin-bottom: var(--space-4);
        }
        .thought-item {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
            font-size: var(--text-sm);
        }
        .thought-label {
            color: var(--text-tertiary);
            width: 120px;
            flex-shrink: 0;
        }
        .thought-value {
            color: var(--text-primary);
        }
        
        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-5);
        }
        .card-full { grid-column: 1 / -1; }
        
        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-5);
        }
        .section-title {
            font-size: var(--text-lg);
            font-weight: 600;
        }
        
        /* Skill Network */
        .skill-node {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
        }
        .skill-name { flex: 1; font-weight: 500; }
        .skill-usage {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        .skill-status {
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-full);
            text-transform: uppercase;
        }
        .skill-status.active {
            background: oklch(65% 0.15 145 / 0.15);
            color: var(--success);
        }
        .skill-status.underused {
            background: oklch(68% 0.18 75 / 0.15);
            color: var(--amber-400);
        }
        .skill-status.neglected {
            background: oklch(100% 0 0 / 0.1);
            color: var(--text-tertiary);
        }
        
        /* Model Routing */
        .routing-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
            font-size: var(--text-sm);
        }
        .routing-task { flex: 1; }
        .routing-model {
            font-family: var(--font-mono);
            color: var(--amber-400);
        }
        .routing-cost {
            color: var(--text-secondary);
        }
        .routing-outcome {
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            text-transform: uppercase;
        }
        .routing-outcome.excellent {
            background: oklch(65% 0.15 145 / 0.15);
            color: var(--success);
        }
        .routing-outcome.good {
            background: oklch(68% 0.18 75 / 0.15);
            color: var(--amber-400);
        }
        
        /* Blocker Card */
        .blocker-card {
            background: oklch(60% 0.18 25 / 0.08);
            border: 1px solid oklch(60% 0.18 25 / 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            margin-bottom: var(--space-4);
        }
        .blocker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-3);
        }
        .blocker-title {
            color: var(--danger);
            font-weight: 600;
        }
        .blocker-owner {
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            background: oklch(100% 0 0 / 0.1);
            border-radius: var(--radius-full);
        }
        .blocker-desc {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            margin-bottom: var(--space-3);
        }
        
        /* Milestone */
        .milestone-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin-bottom: var(--space-4);
        }
        .milestone-name { flex: 1; font-weight: 500; }
        .milestone-track {
            width: 200px;
            height: 8px;
            background: var(--bg-1);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .milestone-fill {
            height: 100%;
            background: var(--amber-500);
            border-radius: var(--radius-full);
            transition: width var(--duration-slow) var(--ease-out-expo);
        }
        .milestone-percent {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            width: 50px;
            text-align: right;
        }
        
        /* File Status */
        .file-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
        }
        .file-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .file-status-dot.active { background: var(--success); }
        .file-status-dot.stale { background: var(--amber-400); }
        .file-name { flex: 1; font-weight: 500; }
        .file-health {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .vitals-grid { grid-template-columns: repeat(2, 1fr); }
            .cards-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; }
            .vitals-grid { grid-template-columns: 1fr; }
        }
        
        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-pulse"></div>
                Claw
            </div>
            <nav class="nav">
                <div class="nav-item active" data-tab="now" onclick="switchTab('now')">
                    <span>◈</span> NOW
                </div>
                <div class="nav-item" data-tab="mind" onclick="switchTab('mind')">
                    <span>◈</span> MIND
                </div>
                <div class="nav-item" data-tab="memory" onclick="switchTab('memory')">
                    <span>◈</span> MEMORY
                </div>
                <div class="nav-item" data-tab="training" onclick="switchTab('training')">
                    <span>◈</span> TRAINING
                    <span class="nav-badge">2</span>
                </div>
                <div class="nav-item" data-tab="trading" onclick="switchTab('trading')">
                    <span>◈</span> TRADING
                </div>
                <div class="nav-item" data-tab="system" onclick="switchTab('system')">
                    <span>◈</span> SYSTEM
                </div>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main" id="mainContent">
            <!-- Content injected by JavaScript -->
        </main>
    </div>
    
    <script src="cognition-intelligence.js"></script>
    <script src="data-bridge.js"></script>
    <script>
        let cognitionData = null;
        let currentTab = 'now';
        
        async function init() {
            // Use DataBridge for dynamic data
            cognitionData = await DataBridge.compileDashboardData();
            renderTab(currentTab);
            
            // Refresh data every 30 seconds
            setInterval(async () => {
                cognitionData = await DataBridge.compileDashboardData();
                if (currentTab === 'now') {
                    renderTab('now'); // Auto-refresh NOW tab
                }
            }, 30000);
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            renderTab(tab);
        }
        
        function renderTab(tab) {
            const container = document.getElementById('mainContent');
            
            switch(tab) {
                case 'now':
                    container.innerHTML = renderNowTab();
                    break;
                case 'mind':
                    container.innerHTML = renderMindTab();
                    break;
                case 'memory':
                    container.innerHTML = renderMemoryTab();
                    break;
                case 'training':
                    container.innerHTML = renderTrainingTab();
                    break;
                case 'trading':
                    container.innerHTML = renderTradingTab();
                    break;
                case 'system':
                    container.innerHTML = renderSystemTab();
                    break;
            }
        }
        
        function renderNowTab() {
            const now = cognitionData.now;
            
            return `
                ${now.intervention.show ? `
                    <div class="intervention-banner ${now.intervention.level}">
                        <div class="intervention-icon">${now.intervention.level === 'red' ? '⚠' : '◈'}</div>
                        <div class="intervention-content">
                            <div class="intervention-title">${now.intervention.message}</div>
                            <div class="intervention-action">${now.intervention.action}</div>
                        </div>
                    </div>
                ` : ''}
                <div class="state-hero">
                    <div class="state-headline">${now.state}</div>
                    <div class="state-meta">Cognitive telemetry active • Week ${cognitionData.training.week}</div>
                </div>
                <div class="vitals-grid">
                    ${Object.entries(now.vitals).map(([key, vital]) => `
                        <div class="vital-card">
                            <div class="vital-label">${key.replace('_', ' ')}</div>
                            <div><span class="vital-value">${vital.value}</span><span class="vital-unit">${vital.unit}</span></div>
                            <div class="vital-trend ${vital.trend}">${vital.trend === 'up' ? '↑' : vital.trend === 'down' ? '↓' : '→'} ${vital.trend}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="thought-stream">
                    <div class="thought-header">Active Thought Stream</div>
                    <div class="thought-item"><div class="thought-label">Current Task</div><div class="thought-value">${now.thought_stream.current_task}</div></div>
                    <div class="thought-item"><div class="thought-label">Models Active</div><div class="thought-value">${now.thought_stream.models_active.join(', ')}</div></div>
                    <div class="thought-item"><div class="thought-label">Skills Invoked</div><div class="thought-value">${now.thought_stream.skills_invoked.join(', ')}</div></div>
                    <div class="thought-item"><div class="thought-label">Context Loaded</div><div class="thought-value">${now.thought_stream.context_loaded.join(', ')}</div></div>
                </div>
            `;
        }
        
        function renderMindTab() {
            const mind = cognitionData.mind;
            
            return `
                <div class="state-hero">
                    <div class="state-headline">Cognitive Stack</div>
                    <div class="state-meta">How I process information and make decisions</div>
                </div>
                <div class="cards-grid">
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Skill Network</span>
                        </div>
                        ${mind.skill_network.nodes.map(node => `
                            <div class="skill-node">
                                <span class="skill-name">${node.id}</span>
                                <span class="skill-usage">${node.usage}×</span>
                                <span class="skill-status ${node.status}">${node.status}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Model Routing</span>
                            <span style="font-size: var(--text-sm); color: var(--text-secondary);">${mind.routing_efficiency.quality_rate}% quality • $${mind.routing_efficiency.cost}</span>
                        </div>
                        ${mind.routing.map(r => `
                            <div class="routing-item">
                                <span class="routing-task">${r.task}</span>
                                <span class="routing-model">${r.model}</span>
                                <span class="routing-cost">$${r.cost}</span>
                                <span class="routing-outcome ${r.outcome}">${r.outcome}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="card card-full">
                        <div class="section-header">
                            <span class="section-title">Decision Quality</span>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-4);">
                            <div>
                                <div style="font-size: var(--text-sm); color: var(--text-tertiary); margin-bottom: var(--space-2);">Autonomous Decisions</div>
                                <div style="font-family: var(--font-mono); font-size: var(--text-2xl); font-weight: 700;">${mind.decisions.autonomous.count}</div>
                                <div style="font-size: var(--text-sm); color: var(--text-secondary);">${mind.decisions.autonomous.quality}% quality</div>
                            </div>
                            <div>
                                <div style="font-size: var(--text-sm); color: var(--text-tertiary); margin-bottom: var(--space-2);">Escalated Decisions</div>
                                <div style="font-family: var(--font-mono); font-size: var(--text-2xl); font-weight: 700;">${mind.decisions.escalated.count}</div>
                                <div style="font-size: var(--text-sm); color: var(--text-secondary);">${mind.decisions.escalated.quality}% quality</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderMemoryTab() {
            const memory = cognitionData.memory;
            
            return `
                <div class="state-hero">
                    <div class="state-headline">Memory Systems</div>
                    <div class="state-meta">What I know and how well I use it</div>
                </div>
                <div class="cards-grid">
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Working Memory</span>
                        </div>
                        <div class="thought-item">
                            <div class="thought-label">Loaded Files</div>
                            <div class="thought-value">${memory.working.loaded_files.join(', ')}</div>
                        </div>
                        <div class="thought-item">
                            <div class="thought-label">Session History</div>
                            <div class="thought-value">${memory.working.session_history}</div>
                        </div>
                        <div class="thought-item">
                            <div class="thought-label">Compression</div>
                            <div class="thought-value">${(memory.working.compression_ratio * 100).toFixed(0)}%</div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Recall Performance</span>
                        </div>
                        <div style="display: flex; gap: var(--space-6);">
                            <div>
                                <div style="font-family: var(--font-mono); font-size: var(--text-3xl); font-weight: 700; color: var(--success);">${memory.recall.remembered}</div>
                                <div style="font-size: var(--text-sm); color: var(--text-secondary);">Remembered</div>
                            </div>
                            <div>
                                <div style="font-family: var(--font-mono); font-size: var(--text-3xl); font-weight: 700; color: var(--danger);">${memory.recall.forgot}</div>
                                <div style="font-size: var(--text-sm); color: var(--text-secondary);">Forgot</div>
                            </div>
                            <div>
                                <div style="font-family: var(--font-mono); font-size: var(--text-3xl); font-weight: 700;">${memory.recall.accuracy}%</div>
                                <div style="font-size: var(--text-sm); color: var(--text-secondary);">Accuracy</div>
                            </div>
                        </div>
                    </div>
                    <div class="card card-full">
                        <div class="section-header">
                            <span class="section-title">Long-term Lessons</span>
                        </div>
                        ${memory.long_term.lessons.map(l => `
                            <div class="skill-node">
                                <span class="skill-name">${l.lesson}</span>
                                <span class="skill-usage">${l.confidence}% conf</span>
                                <span class="skill-status ${l.confidence > 90 ? 'active' : 'underused'}">${l.last_used}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderTrainingTab() {
            const training = cognitionData.training;
            
            return `
                <div class="state-hero">
                    <div class="state-headline">Week ${training.week} • ${training.progress}% Complete</div>
                    <div class="state-meta">Meta-training progress toward autonomous operation</div>
                </div>
                <div class="cards-grid">
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Capabilities Gained</span>
                        </div>
                        ${training.capabilities.map(c => `
                            <div class="skill-node">
                                <span class="skill-name">${c}</span>
                                <span class="skill-status active">✓</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Blockers</span>
                        </div>
                        ${training.blockers.filter(b => b.action_required === 'Marco').map(b => `
                            <div class="blocker-card">
                                <div class="blocker-header">
                                    <span class="blocker-title">${b.title}</span>
                                    <span class="blocker-owner">${b.action_required}</span>
                                </div>
                                <div class="blocker-desc">${b.description}</div>
                            </div>
                        `).join('')}
                        ${training.blockers.filter(b => b.action_required === 'Claw').map(b => `
                            <div class="blocker-card" style="border-color: oklch(68% 0.18 75 / 0.3); background: oklch(68% 0.18 75 / 0.05);">
                                <div class="blocker-header">
                                    <span class="blocker-title" style="color: var(--amber-400);">${b.title}</span>
                                    <span class="blocker-owner">${b.action_required}</span>
                                </div>
                                <div class="blocker-desc">${b.description}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="card card-full">
                        <div class="section-header">
                            <span class="section-title">Milestones</span>
                        </div>
                        ${training.milestones.map(m => `
                            <div class="milestone-item">
                                <span class="milestone-name">${m.name}</span>
                                <div class="milestone-track">
                                    <div class="milestone-fill" style="width: ${m.progress}%"></div>
                                </div>
                                <span class="milestone-percent">${m.progress}%</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderTradingTab() {
            const trading = cognitionData.system.trading;
            
            return `
                <div class="state-hero">
                    <div class="state-headline">Trading Performance</div>
                    <div class="state-meta">Sub-brain dedicated to prediction markets</div>
                </div>
                <div class="vitals-grid">
                    <div class="vital-card">
                        <div class="vital-label">Total Predictions</div>
                        <div><span class="vital-value">${trading.total_predictions}</span></div>
                        <div class="vital-trend up">↑ +3 this week</div>
                    </div>
                    <div class="vital-card">
                        <div class="vital-label">Win Rate</div>
                        <div><span class="vital-value">${trading.win_rate}%</span></div>
                        <div class="vital-trend up">↑ +5%</div>
                    </div>
                    <div class="vital-card">
                        <div class="vital-label">Average Edge</div>
                        <div><span class="vital-value" style="color: var(--success);">+${trading.avg_edge}%</span></div>
                        <div class="vital-trend up">Beating market</div>
                    </div>
                    <div class="vital-card">
                        <div class="vital-label">Edges Discovered</div>
                        <div><span class="vital-value" style="color: var(--danger);">${trading.edge_discovery_rate}</span></div>
                        <div class="vital-trend down">Need improvement</div>
                    </div>
                </div>
                <div class="thought-stream">
                    <div class="thought-header">Trading Insights</div>
                    <div class="thought-item">
                        <div class="thought-label">Status</div>
                        <div class="thought-value">Paper trading — no live capital</div>
                    </div>
                    <div class="thought-item">
                        <div class="thought-label">Focus</div>
                        <div class="thought-value">Weather markets (Polymarket)</div>
                    </div>
                    <div class="thought-item">
                        <div class="thought-label">Next Milestone</div>
                        <div class="thought-value">Deploy $10 live capital</div>
                    </div>
                </div>
            `;
        }
        
        function renderSystemTab() {
            const insights = cognitionData.system;
            
            return `
                <div class="state-hero">
                    <div class="state-headline">System Infrastructure</div>
                    <div class="state-meta">Health of core systems and environment</div>
                </div>
                <div class="cards-grid">
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Core Files</span>
                            <span style="font-size: var(--text-sm); color: var(--text-secondary);">${insights.overall_health}% health</span>
                        </div>
                        ${Object.entries(insights.files).map(([name, file]) => `
                            <div class="file-item">
                                <div class="file-status-dot ${file.status}"></div>
                                <span class="file-name">${name}</span>
                                <span class="file-health">${file.health}%</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Environmental Mastery</span>
                        </div>
                        <div class="thought-item">
                            <div class="thought-label">Tool Proficiency</div>
                            <div class="thought-value">${insights.environment.tool_proficiency}%</div>
                        </div>
                        <div class="thought-item">
                            <div class="thought-label">File System Nav</div>
                            <div class="thought-value">${insights.environment.file_system_nav}%</div>
                        </div>
                        <div class="thought-item">
                            <div class="thought-label">Integration</div>
                            <div class="thought-value">${insights.environment.integration_capabilities}%</div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="section-header">
                            <span class="section-title">Resources</span>
                        </div>
                        <div class="thought-item">
                            <div class="thought-label">Monthly Spend</div>
                            <div class="thought-value">$${insights.resources.monthly_spend} / $${insights.resources.budget}</div>
                        </div>
                        <div class="thought-item">
                            <div class="thought-label">API Health</div>
                            <div class="thought-value" style="color: var(--success);">${insights.resources.api_health}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
