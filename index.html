<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container-low": "#1c1b1b",
                        "surface-container": "#201f1f",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353534",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e4beb6",
                        "outline": "#ab8982",
                        "outline-variant": "#5b403a",
                        "primary": "#ffb4a4",
                        "primary-container": "#ff5733",
                        "tertiary": "#60d5f5",
                        "tertiary-container": "#009fbd",
                    },
                    fontFamily: {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
    <style>
        /* App Shell - The Sovereign Terminal */
        .app { 
            display: flex; 
            min-height: 100vh; 
            background: #131313;
            font-family: 'Inter', sans-serif;
        }
        
        /* Glass Panel */
        .glass-panel {
            background: rgba(19, 19, 19, 0.8);
            backdrop-filter: blur(20px);
        }
        
        /* Milled Surface */
        .milled-surface {
            background: #0e0e0e;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.02), 0 1px 0 rgba(0,0,0,0.8);
        }
        
        /* Hairline Border */
        .hairline-border {
            border: 0.5px solid rgba(91, 64, 58, 0.2);
        }
        
        /* Sidebar */
        .sidebar { 
            width: 256px; 
            background: #0e0e0e;
            border-right: 0.5px solid rgba(91, 64, 58, 0.2);
            display: flex; 
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            padding: 24px 0;
        }
        .logo { 
            padding: 0 24px 32px;
            font-family: 'Newsreader', serif;
            font-size: 28px;
            font-weight: 400;
            font-style: italic;
            letter-spacing: -0.02em;
            color: #e5e2e1;
        }
        .nav { padding: 0 8px; }
        .nav-item { 
            padding: 12px 16px; 
            cursor: pointer; 
            color: rgba(229, 226, 225, 0.4); 
            margin-bottom: 4px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.15s ease;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-item:hover {
            background: #1c1b1b;
            color: rgba(229, 226, 225, 0.8);
        }
        .nav-item.active {
            background: linear-gradient(to right, rgba(255, 87, 51, 0.05), transparent);
            color: #ff5733;
            border-right: 2px solid #ff5733;
            margin-right: -2px;
        }
        /* Material Symbols */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 2px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #5b403a;
        }
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(224, 145, 42, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .nav-item:hover::before {
            left: 100%;
        }
        
        .nav-item:hover { 
            color: var(--text-primary); 
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .nav-item.active { 
            color: var(--amber-400);
            background: rgba(224, 145, 42, 0.1);
            border-color: rgba(224, 145, 42, 0.3);
            box-shadow: 0 0 20px rgba(224, 145, 42, 0.15);
        }
        .nav-badge {
            margin-left: auto;
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            background: oklch(60% 0.18 25 / 0.2);
            color: var(--danger);
            border-radius: var(--radius-full);
            font-weight: 600;
        }
        
        /* Main Content */
        .main { 
            flex: 1; 
            margin-left: 256px;
            padding: 96px 32px 32px;
            min-height: 100vh;
            overflow-y: auto;
        }
        
        /* Tab System */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn var(--duration-slow) var(--ease-out-expo); }
        
        /* Intervention Banner */
        .intervention-banner {
            background: oklch(60% 0.18 25 / 0.1);
            border: 1px solid oklch(60% 0.18 25 / 0.3);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: flex-start;
            gap: var(--space-4);
        }
        .intervention-banner.amber {
            background: oklch(68% 0.18 75 / 0.1);
            border-color: oklch(68% 0.18 75 / 0.3);
        }
        .intervention-icon {
            width: 40px;
            height: 40px;
            background: oklch(60% 0.18 25 / 0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xl);
            flex-shrink: 0;
        }
        .intervention-banner.amber .intervention-icon {
            background: oklch(68% 0.18 75 / 0.2);
        }
        .intervention-content { flex: 1; }
        .intervention-title {
            font-weight: 600;
            margin-bottom: var(--space-2);
            color: var(--danger);
        }
        .intervention-banner.amber .intervention-title {
            color: var(--amber-400);
        }
        .intervention-action {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        
        /* State Hero - Flat, stark */
        .state-hero {
            background: #111111;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 4px;
            padding: 48px;
            margin-bottom: 32px;
        }
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--amber-500), transparent);
        }
        .state-headline {
            font-size: var(--text-2xl);
            font-weight: 600;
            margin-bottom: var(--space-4);
        }
        .state-meta {
            font-size: var(--text-lg);
            color: var(--text-secondary);
        }
        
        /* Vitals Grid */
        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }
        .vital-card {
            background: var(--bg-2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            border: 1px solid oklch(100% 0 0 / 0.05);
        }
        .vital-label {
            font-size: var(--text-xs);
            text-transform: uppercase;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            margin-bottom: var(--space-2);
        }
        .vital-value {
            font-family: var(--font-mono);
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--text-primary);
        }
        .vital-unit {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-left: var(--space-2);
        }
        .vital-trend {
            font-size: var(--text-sm);
            margin-top: var(--space-2);
        }
        .vital-trend.up { color: var(--success); }
        .vital-trend.down { color: var(--danger); }
        .vital-trend.flat { color: var(--text-tertiary); }
        
        /* Thought Stream */
        .thought-stream {
            background: var(--bg-2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            border: 1px solid oklch(100% 0 0 / 0.05);
        }
        .thought-header {
            font-size: var(--text-sm);
            text-transform: uppercase;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            margin-bottom: var(--space-4);
        }
        .thought-item {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
            font-size: var(--text-sm);
        }
        .thought-label {
            color: var(--text-tertiary);
            width: 120px;
            flex-shrink: 0;
        }
        .thought-value {
            color: var(--text-primary);
        }
        
        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-5);
        }
        .card-full { grid-column: 1 / -1; }
        
        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-5);
        }
        .section-title {
            font-size: var(--text-lg);
            font-weight: 600;
        }
        
        /* Skill Network */
        .skill-node {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
        }
        .skill-name { flex: 1; font-weight: 500; }
        .skill-usage {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        .skill-status {
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-full);
            text-transform: uppercase;
        }
        .skill-status.active {
            background: oklch(65% 0.15 145 / 0.15);
            color: var(--success);
        }
        .skill-status.underused {
            background: oklch(68% 0.18 75 / 0.15);
            color: var(--amber-400);
        }
        .skill-status.neglected {
            background: oklch(100% 0 0 / 0.1);
            color: var(--text-tertiary);
        }
        
        /* Model Routing */
        .routing-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
            font-size: var(--text-sm);
        }
        .routing-task { flex: 1; }
        .routing-model {
            font-family: var(--font-mono);
            color: var(--amber-400);
        }
        .routing-cost {
            color: var(--text-secondary);
        }
        .routing-outcome {
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            text-transform: uppercase;
        }
        .routing-outcome.excellent {
            background: oklch(65% 0.15 145 / 0.15);
            color: var(--success);
        }
        .routing-outcome.good {
            background: oklch(68% 0.18 75 / 0.15);
            color: var(--amber-400);
        }
        
        /* Blocker Card */
        .blocker-card {
            background: oklch(60% 0.18 25 / 0.08);
            border: 1px solid oklch(60% 0.18 25 / 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            margin-bottom: var(--space-4);
        }
        .blocker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-3);
        }
        .blocker-title {
            color: var(--danger);
            font-weight: 600;
        }
        .blocker-owner {
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            background: oklch(100% 0 0 / 0.1);
            border-radius: var(--radius-full);
        }
        .blocker-desc {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            margin-bottom: var(--space-3);
        }
        
        /* Milestone */
        .milestone-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin-bottom: var(--space-4);
        }
        .milestone-name { flex: 1; font-weight: 500; }
        .milestone-track {
            width: 200px;
            height: 8px;
            background: var(--bg-1);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .milestone-fill {
            height: 100%;
            background: var(--amber-500);
            border-radius: var(--radius-full);
            transition: width var(--duration-slow) var(--ease-out-expo);
        }
        .milestone-percent {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            width: 50px;
            text-align: right;
        }
        
        /* File Status */
        .file-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            background: var(--bg-1);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-2);
        }
        .file-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .file-status-dot.active { background: var(--success); }
        .file-status-dot.stale { background: var(--amber-400); }
        .file-name { flex: 1; font-weight: 500; }
        .file-health {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        
        /* NOW Tab Cards Grid */
        .now-cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-4);
            margin-bottom: var(--space-5);
        }
        
        @media (max-width: 1400px) {
            .now-cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 900px) {
            .now-cards-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Card Elevated (for hover lift effect) */
        .card-elevated {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card-elevated:hover {
            transform: translateY(-4px);
            box-shadow: var(--elevation-5);
        }
        
        /* Global card style override - makes all cards consistent */
        .main [style*="background: var(--bg-1)"][style*="border-radius: var(--radius-lg)"] {
            background: rgba(40, 40, 40, 0.6) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .main [style*="background: var(--bg-1)"][style*="border-radius: var(--radius-lg)"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        
        /* Stagger animation for children - only animate once */
        .stagger-children > * {
            animation: fadeSlideUp 0.4s ease-out forwards;
            opacity: 0;
        }
        
        .stagger-children > *:nth-child(1) { animation-delay: 0.05s; }
        .stagger-children > *:nth-child(2) { animation-delay: 0.1s; }
        .stagger-children > *:nth-child(3) { animation-delay: 0.15s; }
        .stagger-children > *:nth-child(4) { animation-delay: 0.2s; }
        .stagger-children > *:nth-child(5) { animation-delay: 0.25s; }
        .stagger-children > *:nth-child(6) { animation-delay: 0.3s; }
        
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Model Cards Grid */
        .model-cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-4);
        }
        
        @media (max-width: 1200px) {
            .model-cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .model-cards-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Skill Network Container */
        #skillNetworkViz {
            max-width: 100%;
            overflow: auto;
        }
        
        #skillNetworkViz svg {
            max-width: 100%;
            height: auto;
        }
        
        /* Micro-interactions */
        
        /* Button press effect */
        button, .btn, .nav-item, .card {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        
        button:active, .btn:active {
            transform: scale(0.98);
        }
        
        /* Tab content fade */
        .tab-content {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-1) 25%, var(--bg-2) 50%, var(--bg-1) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Number count-up animation */
        .count-up {
            animation: countUp 0.6s ease-out;
        }
        
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Pulse animation for live indicators */
        .pulse-live {
            animation: pulse-live 2s infinite;
        }
        
        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .state-hero {
                padding: var(--space-5);
            }
            .state-headline {
                font-size: var(--text-2xl);
            }
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-2);
            }
        }
        
        /* Touch Device Optimizations */
        @media (hover: none) {
            .card:hover,
            .card-elevated:hover {
                transform: none;
            }
        }
        
        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
            }
        }
        
        /* Responsive Design */
        
        /* Fluid Typography */
        :root {
            --text-fluid-xs: clamp(0.625rem, 0.8vw, 0.75rem);
            --text-fluid-sm: clamp(0.75rem, 1vw, 0.875rem);
            --text-fluid-base: clamp(0.875rem, 1.2vw, 1rem);
            --text-fluid-lg: clamp(1rem, 1.5vw, 1.125rem);
            --text-fluid-xl: clamp(1.25rem, 2vw, 1.5rem);
            --text-fluid-2xl: clamp(1.5rem, 3vw, 2rem);
            --text-fluid-3xl: clamp(2rem, 4vw, 3rem);
        }
        
        /* Mobile Navigation */
        .mobile-nav-toggle {
            display: none;
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            z-index: 200;
            background: var(--bg-1);
            border: 1px solid oklch(100% 0 0 / 0.1);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            cursor: pointer;
        }
        
        /* Collapsible Sidebar */
        .sidebar-collapsed {
            width: 60px !important;
        }
        .sidebar-collapsed .logo-text,
        .sidebar-collapsed .nav-item span:not(:first-child),
        .sidebar-collapsed .nav-badge {
            display: none;
        }
        .sidebar-collapsed .nav-item {
            justify-content: center;
            padding: var(--space-3);
        }
        .main-expanded {
            margin-left: 60px !important;
        }
        .sidebar-toggle {
            position: absolute;
            bottom: var(--space-4);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-2);
            border: 1px solid oklch(100% 0 0 / 0.1);
            border-radius: var(--radius-md);
            padding: var(--space-2);
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--duration-fast);
        }
        .sidebar-toggle:hover {
            color: var(--text-primary);
            background: var(--bg-0);
        }
        
        /* Responsive Grid */
        .responsive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-4);
        }
        
        /* Tablet (768px - 1024px) */
        @media (max-width: 1024px) {
            .sidebar {
                width: 240px;
            }
            .main {
                margin-left: 240px;
                padding: var(--space-5);
            }
            .vitals-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .state-headline {
                font-size: var(--text-fluid-xl);
            }
        }
        
        /* Mobile (< 768px) */
        @media (max-width: 768px) {
            .mobile-nav-toggle {
                display: flex;
            }
            .sidebar {
                width: 100%;
                transform: translateX(-100%);
                transition: transform var(--duration-normal) var(--ease-out-quart);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main {
                margin-left: 0;
                padding: var(--space-4);
                padding-top: calc(var(--space-4) + 60px);
            }
            .vitals-grid {
                grid-template-columns: 1fr;
            }
            .state-hero {
                padding: var(--space-6);
            }
            .state-headline {
                font-size: var(--text-fluid-lg);
            }
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-2);
            }
            .routing-item,
            .decision-item {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-2);
            }
            .milestone-track {
                width: 100%;
            }
        }
        
        /* Small Mobile (< 480px) */
        @media (max-width: 480px) {
            .main {
                padding: var(--space-3);

        // Skill Network Visualization - Simplified Clean Layout
        let skillNetworkSimulation = null;
        
        function renderSkillNetwork(nodes) {
            const container = document.getElementById('skillNetworkViz');
            if (!container || !window.d3) {
                container.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-tertiary);">Loading...</div>';
                return;
            }
            
            // Stop previous simulation
            if (skillNetworkSimulation) {
                skillNetworkSimulation.stop();
            }
            
            const width = container.clientWidth;
            const height = 400;
            const centerX = width / 2;
            const centerY = height / 2;
            
            // Clear container
            container.innerHTML = '';
            
            // Larger network for visual impact
            const baseRadius = Math.min(width, height) * 0.4;
            
            // Group by category (only show 4 main categories to reduce clutter)
            const mainCategories = ['core', 'design', 'ml', 'workflow'];
            const categoryColors = {
                'core': '#4ade80',
                'design': '#fbbf24', 
                'ml': '#a78bfa',
                'workflow': '#22d3ee',
                'other': '#94a3b8'
            };
            
            // Simplify nodes - group lesser skills as "other"
            const simplifiedNodes = nodes.map(n => ({
                ...n,
                displayCategory: mainCategories.includes(n.category) ? n.category : 'other',
                displayName: n.id.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())
            }));
            
            // Create SVG
            const svg = d3.select('#skillNetworkViz')
                .append('svg')
                .attr('width', width)
                .attr('height', height)
                .attr('viewBox', `0 0 ${width} ${height}`);
            
            // Static radial layout (no force simulation for cleaner look)
            const centerNode = { x: centerX, y: centerY, r: 25, label: 'Claw', color: '#e0912a' };
            
            // Position skills in a clean circle
            const skillNodes = simplifiedNodes.map((node, i) => {
                const angle = (i / simplifiedNodes.length) * 2 * Math.PI - Math.PI / 2;
                const radius = baseRadius;
                return {
                    ...node,
                    x: centerX + radius * Math.cos(angle),
                    y: centerY + radius * Math.sin(angle),
                    r: Math.max(12, 18 - simplifiedNodes.length * 0.2),
                    color: categoryColors[node.displayCategory] || categoryColors.other
                };
            });
            
            // Draw subtle connection lines
            svg.selectAll('.connection')
                .data(skillNodes)
                .enter()
                .append('line')
                .attr('class', 'connection')
                .attr('x1', centerX)
                .attr('y1', centerY)
                .attr('x2', d => d.x)
                .attr('y2', d => d.y)
                .attr('stroke', 'rgba(148,163,184,0.1)')
                .attr('stroke-width', 1);
            
            // Draw center node
            svg.append('circle')
                .attr('cx', centerX)
                .attr('cy', centerY)
                .attr('r', centerNode.r)
                .attr('fill', centerNode.color)
                .attr('stroke', 'var(--bg-0)')
                .attr('stroke-width', 3);
            
            svg.append('text')
                .attr('x', centerX)
                .attr('y', centerY + 5)
                .attr('text-anchor', 'middle')
                .attr('fill', 'var(--bg-0)')
                .attr('font-size', '12px')
                .attr('font-weight', '700')
                .text('Claw');
            
            // Draw skill nodes
            const nodeGroups = svg.selectAll('.skill-node')
                .data(skillNodes)
                .enter()
                .append('g')
                .attr('class', 'skill-node')
                .style('cursor', 'pointer')
                .on('click', (event, d) => showSkillDetail(d.id));
            
            // Node circles
            nodeGroups.append('circle')
                .attr('cx', d => d.x)
                .attr('cy', d => d.y)
                .attr('r', d => d.r)
                .attr('fill', d => d.color)
                .attr('stroke', 'var(--bg-0)')
                .attr('stroke-width', 2)
                .attr('opacity', 0.9)
                .on('mouseover', function() {
                    d3.select(this).attr('opacity', 1).attr('stroke-width', 3);
                })
                .on('mouseout', function() {
                    d3.select(this).attr('opacity', 0.9).attr('stroke-width', 2);
                });
            
            // Usage number inside node
            nodeGroups.append('text')
                .attr('x', d => d.x)
                .attr('y', d => d.y + 3)
                .attr('text-anchor', 'middle')
                .attr('fill', 'var(--bg-0)')
                .attr('font-size', d => d.r > 15 ? '10px' : '8px')
                .attr('font-weight', '600')
                .text(d => d.usage);
            
            // Labels outside nodes (only for larger screens or high-usage skills)
            nodeGroups.filter(d => d.usage > 5 || isFullscreen)
                .append('text')
                .attr('x', d => d.x)
                .attr('y', d => d.y + d.r + 12)
                .attr('text-anchor', 'middle')
                .attr('fill', 'var(--text-secondary)')
                .attr('font-size', '10px')
                .text(d => d.displayName.length > 12 ? d.displayName.substring(0, 12) + '...' : d.displayName);
            
            // Legend
            const legend = svg.append('g')
                .attr('transform', `translate(${width - 100}, 20)`);
            
            Object.entries(categoryColors).forEach(([cat, color], i) => {
                legend.append('circle')
                    .attr('cx', 0)
                    .attr('cy', i * 20)
                    .attr('r', 6)
                    .attr('fill', color);
                
                legend.append('text')
                    .attr('x', 12)
                    .attr('y', i * 20 + 4)
                    .attr('fill', 'var(--text-secondary)')
                    .attr('font-size', '10px')
                    .text(cat.charAt(0).toUpperCase() + cat.slice(1));
            });
            
            // Store data
            window.skillNetworkData = {};
            nodes.forEach(node => {
                window.skillNetworkData[node.id] = node;
            });
        }
        
        // Handle resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const mind = cognitionData?.mind;
                if (mind?.skill_network?.nodes && currentTab === 'mind') {
                    renderSkillNetwork(mind.skill_network.nodes);
                }
            }, 250);
        });
        
        function showSkillDetail(skillId) {
            const node = window.skillNetworkData[skillId];
            if (!node) return;
            
            const panel = document.getElementById('skillDetailPanel');
            panel.style.display = 'block';
            panel.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-3);">
                    <span style="font-weight: 600; font-size: var(--text-xl);">${node.id}</span>
                    <span class="skill-status ${node.status}">${node.status}</span>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); margin-bottom: var(--space-4);">
                    <div>
                        <div style="font-size: var(--text-sm); color: var(--text-tertiary);">Used</div>
                        <div style="font-family: var(--font-mono); font-size: var(--text-2xl); font-weight: 700;">${node.usage}×</div>
                    </div>
                    <div>
                        <div style="font-size: var(--text-sm); color: var(--text-tertiary);">Effectiveness</div>
                        <div style="font-family: var(--font-mono); font-size: var(--text-2xl); font-weight: 700; color: var(--amber-400);">${node.effectiveness}%</div>
                    </div>
                    <div>
                        <div style="font-size: var(--text-sm); color: var(--text-tertiary);">Last Used</div>
                        <div style="font-family: var(--font-mono); font-size: var(--text-lg); font-weight: 600;">${node.last_used}</div>
                    </div>
                </div>
                <div style="margin-bottom: var(--space-3);">
                    <div style="font-size: var(--text-sm); color: var(--text-tertiary); margin-bottom: var(--space-1);">Synergies</div>
                    <div style="color: var(--text-secondary);">${node.synergy.join(', ') || 'None'}</div>
                </div>
                <div style="background: var(--bg-0); border-radius: var(--radius-md); padding: var(--space-3);">
                    <div style="font-size: var(--text-sm); color: var(--text-tertiary); margin-bottom: var(--space-1);">Recent Example</div>
                    <div style="color: var(--text-secondary); font-size: var(--text-sm);">${node.example}</div>
                </div>
            `;
            
            // Scroll to panel
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
