<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        surface: "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container-low": "#1c1b1b",
                        "surface-container": "#201f1f",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353534",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e4beb6",
                        outline: "#ab8982",
                        "outline-variant": "#5b403a",
                        primary: "#ffb4a4",
                        "primary-container": "#ff5733",
                        tertiary: "#60d5f5",
                        "tertiary-container": "#009fbd",
                    },
                    fontFamily: {
                        headline: ["Newsreader", "serif"],
                        body: ["Inter", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
    <style>
        /* Base */
        body {
            font-family: 'Inter', sans-serif;
            background: #131313;
            color: #e5e2e1;
        }
        
        /* Glass Panel */
        .glass-panel {
            background: rgba(19, 19, 19, 0.85);
            backdrop-filter: blur(20px);
        }
        
        /* Milled Surface */
        .milled-surface {
            background: #0e0e0e;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.02), 0 1px 0 rgba(0,0,0,0.8);
        }
        
        /* Hairline Border */
        .hairline-border {
            border: 0.5px solid rgba(91, 64, 58, 0.2);
        }
        
        /* Material Symbols */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 2px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #5b403a;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body">
    <!-- Background Ambient Glow -->
    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-primary-container/5 blur-[120px]"></div>
        <div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-tertiary/5 blur-[100px]"></div>
    </div>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass-panel border-b border-outline-variant/10 flex justify-between items-center px-8 py-4">
        <div class="flex items-center gap-8">
            <span class="font-headline italic text-2xl tracking-tighter text-on-surface">Claw</span>
            <nav class="hidden md:flex items-center gap-6">
                <span class="text-primary-container font-medium text-sm">Command Center</span>
                <span class="text-on-surface/60 text-sm">v7.0</span>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 px-3 py-1.5 bg-surface-container-low hairline-border rounded">
                <span class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse"></span>
                <span class="text-[10px] font-mono uppercase tracking-wider text-primary-container">Live</span>
            </div>
            <span class="text-[10px] font-mono text-on-surface/40" id="headerTime">--:--:--</span>

    <div class="flex min-h-screen">

        <aside class="w-64 bg-surface-container-lowest border-r border-outline-variant/10 flex flex-col fixed h-full z-40 pt-20">
            <nav class="flex-1 px-4 py-6 space-y-1">
                <button onclick="switchTab('now')" data-tab="now" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-on-surface/60 hover:text-on-surface hover:bg-surface-container-low rounded transition-colors text-sm">
                    <span class="material-symbols-outlined">target</span>
                    <span>Now</span>
                </button>
                <button onclick="switchTab('mind')" data-tab="mind" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-on-surface/60 hover:text-on-surface hover:bg-surface-container-low rounded transition-colors text-sm">
                    <span class="material-symbols-outlined">neurology</span>
                    <span>Mind</span>
                </button>
                <button onclick="switchTab('memory')" data-tab="memory" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-on-surface/60 hover:text-on-surface hover:bg-surface-container-low rounded transition-colors text-sm">
                    <span class="material-symbols-outlined">database</span>
                    <span>Memory</span>
                </button>
                <button onclick="switchTab('training')" data-tab="training" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-on-surface/60 hover:text-on-surface hover:bg-surface-container-low rounded transition-colors text-sm">
                    <span class="material-symbols-outlined">school</span>
                    <span>Training</span>
                </button>
                <button onclick="switchTab('trading')" data-tab="trading" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-on-surface/60 hover:text-on-surface hover:bg-surface-container-low rounded transition-colors text-sm">
                    <span class="material-symbols-outlined">trending_up</span>
                    <span>Trading</span>
                </button>
                <button onclick="switchTab('system')" data-tab="system" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-on-surface/60 hover:text-on-surface hover:bg-surface-container-low rounded transition-colors text-sm">
                    <span class="material-symbols-outlined">settings</span>
                    <span>System</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64 pt-20 pb-8 px-8 min-h-screen overflow-y-auto custom-scrollbar" id="mainContent">
            <!-- Content rendered here -->
        </main>
    </div>

    <script src="data-bridge.js"></script>
    <script>
        let currentTab = 'now';
        let cognitionData = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboardData();
            setInterval(updateHeaderTime, 1000);
            updateHeaderTime();
            // Set initial active nav
            const nowNav = document.querySelector('[data-tab="now"]');
            if (nowNav) {
                nowNav.classList.remove('text-on-surface/60');
                nowNav.classList.add('text-primary-container', 'bg-surface-container-low');
            }
        });

        function updateHeaderTime() {
            const now = new Date();
            document.getElementById('headerTime').textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }

        async function loadDashboardData() {
            try {
                if (typeof DataBridge !== 'undefined') {
                    cognitionData = await DataBridge.compileDashboardData();
                } else {
                    cognitionData = getFallbackData();
                }
                renderTab(currentTab);
            } catch (e) {
                console.error('Failed to load dashboard data:', e);
                cognitionData = getFallbackData();
                renderTab(currentTab);
            }
        }

        function getFallbackData() {
            return {
                now: { attention: [] },
                mind: {
                    skill_network: { 
                        nodes: [
                            { id: 'impeccable', name: 'Impeccable', tier: 'core', usage_count: 45, success_rate: 92, description: 'Frontend design and UI/UX excellence', connections: ['frontend-design', 'critique'] },
                            { id: 'polymarket', name: 'Polymarket', tier: 'core', usage_count: 38, success_rate: 88, description: 'Prediction market trading and analysis', connections: ['trading', 'analysis'] },
                            { id: 'proactive-agent', name: 'Proactive Agent', tier: 'master', usage_count: 32, success_rate: 85, description: 'Autonomous decision making and escalation', connections: ['agency-agents'] },
                            { id: 'mirofish', name: 'MiroFish', tier: 'master', usage_count: 28, success_rate: 82, description: 'Multi-agent simulation and forecasting', connections: ['analysis'] },
                            { id: 'agency-agents', name: 'Agency Agents', tier: 'active', usage_count: 24, success_rate: 78, description: 'Collection of specialized AI agents' },
                            { id: 'frontend-design', name: 'Frontend Design', tier: 'active', usage_count: 42, success_rate: 90, description: 'UI/UX design and implementation' },
                            { id: 'trading', name: 'Trading', tier: 'active', usage_count: 35, success_rate: 86, description: 'Financial market analysis and execution' },
                            { id: 'analysis', name: 'Analysis', tier: 'active', usage_count: 40, success_rate: 88, description: 'Data analysis and insights' },
                            { id: 'critique', name: 'Critique', tier: 'active', usage_count: 22, success_rate: 80, description: 'Design and code review' },
                            { id: 'qmd-search', name: 'QMD Search', tier: 'available', usage_count: 15, success_rate: 75, description: 'Semantic search for markdown' },
                            { id: 'self-improvement', name: 'Self Improvement', tier: 'available', usage_count: 18, success_rate: 77, description: 'Continuous learning and adaptation' },
                            { id: 'confidence-tracker', name: 'Confidence Tracker', tier: 'available', usage_count: 12, success_rate: 73, description: 'Track validation of learnings' }
                        ],
                        links: []
                    },
                    decisions: { autonomous: { count: 156, quality: 87 }, escalated: { count: 23, quality: 92 }, trend: 'improving', examples: [
                        { context: 'Dashboard redesign', decision: 'Use Sovereign Terminal aesthetic', reasoning: 'Matches DESIGN.md specification', outcome: 'success', timestamp: '2026-03-22', type: 'autonomous' },
                        { context: 'MIND tab', decision: 'Add D3.js visualization', reasoning: 'Required for skill network display', outcome: 'pending', timestamp: '2026-03-22', type: 'escalated' }
                    ]}
                },
                memory: { working: {}, long_term: { lessons: [] }, recent_failures: [] },
                training: { week: 1, progress: 0, capabilities: [], blockers: [] },
                trading: { total_predictions: 0, win_rate: 0, edge_discovery_rate: 0 },
                system: { gateway: [], files: {} }
            };
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('text-primary-container', 'bg-surface-container-low');
                el.classList.add('text-on-surface/60');
            });
            const activeNav = document.querySelector(`[data-tab="${tab}"]`);
            if (activeNav) {
                activeNav.classList.remove('text-on-surface/60');
                activeNav.classList.add('text-primary-container', 'bg-surface-container-low');
            }
            renderTab(tab);
        }

        function toggleDetailPanel(panelId) {
            const panel = document.getElementById(panelId);
            if (panel) {
                panel.classList.toggle('hidden');
            }
        }

        function refreshDashboardData() {
            loadDashboardData();
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
            const refreshEl = document.getElementById('lastRefresh');
            if (refreshEl) {
                refreshEl.textContent = timeStr;
            }
        }

        function renderTab(tab) {
            const container = document.getElementById('mainContent');
            switch(tab) {
                case 'now':
                    container.innerHTML = renderNowTab();
                    break;
                case 'mind':
                    container.innerHTML = renderMindTab();
                    break;
                case 'memory':
                    container.innerHTML = renderMemoryTab();
                    break;
                case 'training':
                    container.innerHTML = renderTrainingTab();
                    break;
                case 'trading':
                    container.innerHTML = renderTradingTab();
                    break;
                case 'system':
                    container.innerHTML = renderSystemTab();
                    break;
                default:
                    container.innerHTML = renderNowTab();
            }
        }

        // Tab render functions will be added here
        function renderNowTab() {
            const now = cognitionData?.now || {};
            const training = cognitionData?.training || { week: 11, progress: 50 };
            const memory = cognitionData?.memory || {};
            const system = cognitionData?.system || {};

            const systemTotal = system?.gateway?.length || 4;
            const systemIssues = system?.gateway?.filter(s => s?.status === 'degraded')?.length || 0;
            const trainingWeek = training?.week || 11;
            const trainingProgress = training?.progress || 50;
            const predictions = system?.trading?.total_predictions || 0;

                    <!-- Main Module: Activity Stream (8 cols) -->

                                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 border border-primary-container/40 rounded-full"></div>
                                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 border border-tertiary/20 rounded-full"></div>
                                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[1px] bg-outline-variant/20"></div>
                                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[1px] h-full bg-outline-variant/20"></div>
                                    </div>
                                    <div class="p-4 relative h-full flex flex-col justify-between">
                                        <div class="text-[10px] font-mono text-tertiary/60 uppercase tracking-widest">System Health</div>
                                        <div class="space-y-3">
                                            <div class="flex items-center gap-2">
                                                <div class="w-1.5 h-1.5 bg-primary-container rounded-full"></div>
                                                <div class="h-[1px] flex-1 bg-gradient-to-r from-primary-container/40 to-transparent"></div>
                                                <span class="text-[10px] font-mono">MIND_ACTIVE</span>
                                            </div>

                                    </div>

                                <div class="flex justify-between items-start mb-4">

                                <div class="flex justify-between items-start mb-4">
                                    <span class="material-symbols-outlined text-on-surface/40">trending_up</span>
                                    <span class="text-[10px] font-mono text-on-surface/40">PAPER</span>
                                </div>
                                <h4 class="font-headline text-lg italic mb-1">Trading</h4>
                                <div class="font-mono text-2xl text-on-surface mb-1">${predictions}</div>

                                <div class="flex justify-between items-start mb-4">
                                    <span class="material-symbols-outlined text-on-surface/40">database</span>

                                <h4 class="font-headline text-lg italic mb-1">Memory</h4>

                    <!-- Right Sidebar: Metrics & Status (4 cols) -->

                        <!-- System Health -->

                                <div class="space-y-8">

        function renderSkillNetwork(nodes) {
            const container = document.getElementById('skillNetworkViz');
            if (!container || !nodes || nodes.length === 0) {
                console.log('Skill network: no container or nodes', container, nodes);
                return;
            }
            
            // Wait for container to have size
            if (container.clientWidth === 0 || container.clientHeight === 0) {
                setTimeout(() => renderSkillNetwork(nodes), 100);
                return;
            }
            
            container.innerHTML = '';
            const width = container.clientWidth;
            const height = container.clientHeight;
            console.log('Rendering skill network:', nodes.length, 'nodes, size:', width, 'x', height);
            
            const svg = d3.select('#skillNetworkViz')
                .append('svg')
                .attr('width', width)
                .attr('height', height)
                .attr('viewBox', [0, 0, width, height]);
            
            // Color scale by tier
            const colorScale = {
                'core': '#ff5733',
                'master': '#60d5f5',
                'active': '#e5e2e1',
                'available': '#5b403a'
            };
            
            // Size scale by tier
            const sizeScale = {
                'core': 20,
                'master': 14,
                'active': 10,
                'available': 8
            };
            
            // Create links (connect related skills)
            const links = [];
            nodes.forEach((node, i) => {
                if (node.connections) {
                    node.connections.forEach(targetId => {
                        const target = nodes.find(n => n.id === targetId);
                        if (target) {
                            links.push({ source: node.id, target: targetId });
                        }
                    });
                }
            });
            
            // Simple radial layout - more stable
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.35;
            
            // Position nodes in concentric circles by tier
            const tierOrder = ['core', 'master', 'active', 'available'];
            const tierRadius = { core: 0, master: radius * 0.3, active: radius * 0.6, available: radius * 0.9 };
            
            nodes.forEach((node, i) => {
                const tierIndex = tierOrder.indexOf(node.tier);
                const nodesInTier = nodes.filter(n => n.tier === node.tier);
                const indexInTier = nodesInTier.indexOf(node);
                const angle = (indexInTier / nodesInTier.length) * 2 * Math.PI;
                const r = tierRadius[node.tier] || radius * 0.5;
                
                node.x = centerX + r * Math.cos(angle);
                node.y = centerY + r * Math.sin(angle);
                node.fx = node.x; // Fix position initially
                node.fy = node.y;
            });
            
            // Light force simulation for subtle movement
            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(80).strength(0.5))
                .force('charge', d3.forceManyBody().strength(-50))
                .force('center', d3.forceCenter(centerX, centerY).strength(0.1))
                .force('collision', d3.forceCollide().radius(d => (sizeScale[d.tier] || 10) + 5))
                .alpha(0.3)
                .alphaDecay(0.05);
            
            // Draw links
            const link = svg.append('g')
                .selectAll('line')
                .data(links)
                .join('line')
                .attr('stroke', '#5b403a')
                .attr('stroke-width', 0.5)
                .attr('stroke-opacity', 0.4);
            
            // Draw nodes
            const node = svg.append('g')
                .selectAll('g')
                .data(nodes)
                .join('g')
                .attr('class', 'skill-node')
                .style('cursor', 'pointer')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            // Node circles
            node.append('circle')
                .attr('r', d => sizeScale[d.tier] || 10)
                .attr('fill', d => colorScale[d.tier] || '#5b403a')
                .attr('stroke', '#131313')
                .attr('stroke-width', 2);
            
            // Node labels (only for core and master)
            node.filter(d => d.tier === 'core' || d.tier === 'master')
                .append('text')
                .text(d => d.name)
                .attr('x', d => (sizeScale[d.tier] || 10) + 5)
                .attr('y', 4)
                .attr('font-size', '10px')
                .attr('fill', '#e5e2e1')
                .attr('font-family', 'JetBrains Mono, monospace');
            
            // Click handler
            node.on('click', (event, d) => {
                showSkillDetail(d);
            });
            
            // Update positions
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
            
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = null; // Release fixed position on drag
                d.fy = null;
            }
            
            function dragged(event, d) {
                d.x = event.x;
                d.y = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
            }
        }
